# =============================================================================
# MedSeg Vision — SAM Fullstack (CLEAN RESTORATION)
# =============================================================================
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: medseg-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-storage:/app/storage
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: medseg-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-storage:
