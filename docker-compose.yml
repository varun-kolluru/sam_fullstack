# =============================================================================
# MedSeg Vision — SAM Fullstack (PORT RESTORATION 3000/8000)
# =============================================================================
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: medseg-backend
    privileged: true
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib64:/usr/local/cuda/lib64
    volumes:
      - backend-storage:/app/storage
      - /usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu:ro
    # Note: Using Privileged mode + manual volumes to bypass failing hook
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: medseg-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-storage:
