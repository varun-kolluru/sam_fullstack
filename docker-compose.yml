# =============================================================================
# MedSeg Vision — SAM Fullstack (NUCLEAR GPU BYPASS)
# =============================================================================
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: medseg-backend
    privileged: true
    ports:
      - "7263:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib64:/usr/local/cuda/lib64
    volumes:
      - backend-storage:/app/storage
      - /usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu:ro
    # Note: Removing the 'deploy' block to bypass the failing NVIDIA OCI hook
    # Privileged mode + manual volumes handle the GPU connection here
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: medseg-frontend
    ports:
      - "7262:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-storage:
