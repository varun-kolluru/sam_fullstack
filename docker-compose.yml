# =============================================================================
# MedSeg Vision — SAM Fullstack (MINIMALIST GPU BYPASS)
# =============================================================================
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: medseg-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-storage:/app/storage
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: medseg-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-storage:
